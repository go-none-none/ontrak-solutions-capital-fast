<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>Base44 APP</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const email = urlParams.get('email');
      const apiKey = 'a8F3kL9xQ2mZ7vP1rT6wYc4HjN5uD0sB';
      
      if (email) {
        // Auto-track page view on load
        fetch('https://app.base44.com/apps/69b997d063541d627aa671c2/api/functions/trackWebEvent', {
          method: 'POST',
          headers: {
            'x-api-key': apiKey,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: email,
            event_type: 'page_view',
            page: window.location.pathname
          })
        }).catch(e => console.log('Tracking error:', e));
        
        // Make email available for manual tracking
        window.campaignEmail = email;
      }
      
      // Manual tracking function
      function trackEvent(eventType, page) {
        if (!window.campaignEmail) return;
        fetch('https://app.base44.com/apps/69b997d063541d627aa671c2/api/functions/trackWebEvent', {
          method: 'POST',
          headers: {
            'x-api-key': apiKey,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: window.campaignEmail,
            event_type: eventType,
            page: page || window.location.pathname
          })
        }).catch(e => console.log('Tracking error:', e));
      }
    </script>
  </body>
</html>
